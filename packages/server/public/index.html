<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EN IPTV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #c9d1d9; --text-dim: #8b949e; --accent: #58a6ff;
      --green: #238636; --green-hover: #2ea043; --radius: 12px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .container { max-width: 600px; width: 100%; text-align: center; }
    .logo { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    .logo span { color: var(--accent); }
    .tagline { color: var(--text-dim); font-size: 15px; margin-bottom: 32px; }
    .cards { display: flex; flex-direction: column; gap: 12px; }
    .card {
      display: flex; align-items: center; gap: 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 24px;
      text-decoration: none; color: var(--text);
      transition: border-color 0.15s, transform 0.15s;
      text-align: left;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .card:active { transform: scale(0.99); }
    .card-icon { font-size: 28px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; }
    .card-body { flex: 1; }
    .card-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
    .card-desc { font-size: 13px; color: var(--text-dim); }
    .card-arrow { font-size: 20px; color: var(--text-dim); }
    .status { margin-top: 24px; font-size: 13px; color: var(--text-dim); }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #3fb950; margin-right: 6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">EN <span>IPTV</span></div>
    <div class="tagline">Your personal IPTV streaming platform</div>
    <div class="cards">
      <a class="card" href="/enplayer">
        <div class="card-icon">▶</div>
        <div class="card-body">
          <div class="card-title">EN Player</div>
          <div class="card-desc">Watch your channels with the Shaka-powered player</div>
        </div>
        <div class="card-arrow">→</div>
      </a>
      <a class="card" href="/manage">
        <div class="card-icon">⚙</div>
        <div class="card-body">
          <div class="card-title">Channel Manager</div>
          <div class="card-desc">Add, edit, delete channels and configure proxies</div>
        </div>
        <div class="card-arrow">→</div>
      </a>
      <a class="card" href="/api/playlist.m3u">
        <div class="card-icon">📋</div>
        <div class="card-body">
          <div class="card-title">M3U Playlist</div>
          <div class="card-desc">Download your playlist in standard M3U format</div>
        </div>
        <div class="card-arrow">→</div>
      </a>
    </div>
    <div class="status"><span class="status-dot"></span>Server running</div>
  </div>
</body>
</html>
